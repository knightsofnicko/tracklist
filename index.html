
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knights of Nicko - Past, Present and Future (2025)</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #0e0e0e;
      color: white;
      padding: 0;
      margin: 0;
      text-align: center;
      padding-bottom: 80px;
      padding-top: 160px; /* espaço para o header fixo */
    }

    .header {
      padding: 40px 20px 10px;
    }

    .logo {
      max-width: 220px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #FF3333;
    }

    .main-section {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      flex-wrap: nowrap;
    }

    .banner {
      flex: 0 0 auto;
      display: block;
    }

    .banner img {
      height: 100%;
      max-height: 100%;
      width: auto;
      display: block;
    }

    .tracklist {
      flex: 0 0 auto;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      max-width: 600px;
    }

    th, td {
      padding: 12px 20px;
      border: 1px solid #444;
      text-align: left;
    }

    td a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    tr:hover {
      background-color: #ff0000;
    }

    @media (max-width: 900px) {
      .main-section {
        flex-direction: column;
        align-items: center;
      }
      .banner img {
        width: 80%;
        height: auto;
        margin-bottom: 20px;
      }
    }

    .video-footer {
      margin-top: 40px;
      padding: 10px;
      background-color: #1a1a1a;
      display: flex;
      justify-content: center;
      gap: 20px;
      align-items: center;
      border-top: 1px solid #333;
    }

    .video-footer img {
      height: 80px;
      object-fit: contain;
    }       

    .video-header {
      background-color: #1a1a1a;
      padding: 10px 0;                          /* remove espaçamento lateral */
      display: flex;
      justify-content: center;                 /* centraliza horizontalmente */
      align-items: center;                     /* centraliza verticalmente */
      border-bottom: 1px solid #333;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
    }

    .video-header img {
      height: 160px;
      object-fit: contain;
    }

  </style>
</head>
<body>
  <div class="video-header">  
    <a href="index.html">
      <img src="logo.png" alt="Knights of Nicko Logo" class="logo">
    </a>
  </div>
  <div class="header">  
    <h1>Knights of Nicko - Past, Present and Future (2025)</h1>
  </div>

  <div class="main-section">
    <iframe width="560" height="315" src="https://www.youtube.com/embed/RX5f-yhpD74?si=tXWG7oPx8zb1lJmi&amp;controls=0" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
  </div>
    <footer class="video-footer">
      <a href="https://www.youtube.com/raphabpc" target="_blank">
        <img src="tbrlogo.png" alt="Timbabo Records Logo">
      </a>
    </footer>  
</body>
</html>
